name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            tauri_args: "--bundles appimage"
          - platform: windows-latest
            tauri_args: "--bundles nsis"
          - platform: macos-latest
            tauri_args: "--bundles dmg"
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92.0"

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Setup protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "25.3"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Build unsigned macOS bundles by default.
          # This avoids CI hard-fail when Apple certificate secrets are invalid/missing.
        with:
          tagName: ${{ github.ref_name }}
          releaseName: LanceDB Viewer ${{ github.ref_name }}
          releaseBody: |
            LanceDB Viewer is a read-only desktop app for AI and RAG developers who need to inspect LanceDB datasets without throwaway scripts.

            Best for:
            - checking what landed after ingestion or indexing
            - confirming schema, row counts, and vector dimensions
            - inspecting local knowledge-base folders safely

            30-second start:
            1. Download the installer for your platform.
            2. Open LanceDB Viewer.
            3. Select the root folder that contains your LanceDB data.
            4. Click a table to inspect schema or preview rows.

            Download guide:
            - Windows: use `*x64-setup.exe`
            - macOS: use `*aarch64.dmg`
            - Linux: use `*amd64.AppImage`

            macOS security note:
            - Current macOS builds may be unsigned/unnotarized if Apple signing secrets are not configured.
            - If macOS blocks launch, move the app to `/Applications` and run:
              `xattr -dr com.apple.quarantine "/Applications/LanceDB Viewer.app"`
            - This release currently targets Apple Silicon (arm64) only.

            Current limits:
            - read-only inspection only
            - no export actions yet
            - large recursive scans may be slow

            Feedback wanted:
            1. What kind of LanceDB data are you inspecting?
            2. Which step felt slow or unclear?
            3. What should the next release add first?

            Docs:
            - Quick start: https://github.com/wufeng1740/lanceDB-viewer#quick-start
            - Sample data: https://github.com/wufeng1740/lanceDB-viewer/blob/main/docs/sample-data.md
            - Discussions: https://github.com/wufeng1740/lanceDB-viewer/discussions
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.tauri_args }}
